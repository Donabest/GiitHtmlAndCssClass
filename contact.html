<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/index.css" />
    <link
      rel="stylesheet"
      href="/css/media.css"
      media="screen and (max-width:768px)"
    />
    <link rel="preload" href="/images/hompageImag.jpg" />
    <title>Hotel Website | Contact</title>
  </head>
  <style></style>
  <body>
    <main id="main">
      <!-- Navbar -->
      <nav class="navbar">
        <h1 class="logo">HBT</h1>
        <ul id="Links">
          <li class="link home-link">
            <a href="/index.html">Home</a>
          </li>
          <li class="link about-link"><a href="/about.html">About</a></li>
          <li class="link contact-link">
            <a href="/contact.html" class="home">Contact</a>
          </li>
        </ul>
      </nav>

      <section id="contact">
        <h1><span>Contact</span> Us</h1>
        <p>please fill the form below to contact us</p>

        <form class="form-wrap">
          <div class="form-group form-name">
            <label for="name">Name</label>
            <input type="text" placeholder="john Doe" />
          </div>

          <div class="form-group form-email">
            <label for="email">Email</label>
            <input type="email" placeholder="johnDoe@gmail.com" />
          </div>

          <div class="form-group form-message">
            <label for="message">Message</label>
            <textarea name="message" id="message"></textarea>
          </div>

          <button type="submit" class="btn bg-primary">Submit</button>
        </form>
      </section>

      <section id="contact-info">
        <div class="container">
          <div class="box">
            <h1>Location</h1>
            <p>Giit Africa,Nigeria</p>
          </div>

          <div class="box">
            <h1>Phone Number</h1>
            <p>+234 90 4345 703 90</p>
          </div>

          <div class="box">
            <h1>Email</h1>
            <p>GiitAfricaNigeria@gmail.com</p>
          </div>
        </div>
      </section>
      <!-- Footer -->
      <footer id="footer">
        <p>Hotel HBT &copy; 2026 All Right Reserved</p>
      </footer>
    </main>
  </body>
</html>
